<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CamilaEvelyn</title>
    <script>
        // Digital Clock with Multiple Time Zones
        function updateClock() {
            const timeZones = {
                'UTC': 0,
                'EST': -5,
                'CST': -6,
                'PST': -7,
            };
            const now = new Date();
            const clockElements = document.getElementsByClassName('digital-clock');
            for (const element of clockElements) {
                const offset = timeZones[element.dataset.timezone];
                const localTime = new Date(now.getTime() + offset * 60 * 60 * 1000);
                element.innerHTML = localTime.toISOString().replace('T', ' ').substring(0, 19);
            }
        }
        setInterval(updateClock, 1000);
        window.onload = updateClock;

        // Geolocation Notification for Academy Arrival
        function checkGeolocation() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(position => {
                    const userCoordinates = {
                        lat: position.coords.latitude,
                        lng: position.coords.longitude
                    };
                    const academyLocation = { lat: -3.756198272665352, lng: -38.56503948107475 };
                    const distance = Math.sqrt(Math.pow(userCoordinates.lat - academyLocation.lat, 2) + Math.pow(userCoordinates.lng - academyLocation.lng, 2));
                    if (distance < 0.01) { // threshold of 0.01 degrees
                        alert('You have arrived at the academy!');
                    }
                });
            } else {
                alert('Geolocation is not supported by this browser.');
            }
        }
        window.onload = checkGeolocation;

        // Daily Creatine Reminder
        function creatineReminder() {
            const now = new Date();
            if (now.getHours() === 21 && now.getMinutes() === 0) {
                alert('Time to take your creatine!');
            }
        }
        setInterval(creatineReminder, 60000);
    </script>
</head>
<body>
    <h1>Welcome to CamilaEvelyn</h1>
    <!-- Digital Clock Elements -->
    <div>
        <div class="digital-clock" data-timezone="UTC"></div>
        <div class="digital-clock" data-timezone="EST"></div>
        <div class="digital-clock" data-timezone="CST"></div>
        <div class="digital-clock" data-timezone="PST"></div>
    </div>
    <!-- Original Firebase content here -->
</body>
</html>
