<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Academy Arrival and Reminder</title>
</head>
<body>
    <h1>Welcome to the Academy</h1>
    <script>
        // Geolocation notification for academy arrival
        function notifyGeolocation() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(function(position) {
                    const academyCoords = { lat: -3.756198272665352, lng: -38.56503948107475 };
                    const userCoords = { lat: position.coords.latitude, lng: position.coords.longitude };
                    const distance = Math.sqrt(Math.pow(userCoords.lat - academyCoords.lat, 2) + Math.pow(userCoords.lng - academyCoords.lng, 2));
                    if (distance < 0.01) { // Adjust distance threshold as needed
                        alert('You have arrived at the Academy!');
                    }
                });
            } else {
                alert('Geolocation is not supported by this browser.');
            }
        }

        // Daily creatine reminder at 21:00
        function creatineReminder() {
            const now = new Date();
            const reminderTime = new Date();
            reminderTime.setHours(21, 0, 0, 0);
            if (now.getHours() === 21) {
                alert('Time to take your daily creatine!');
            }
        }

        // Call the functions
        notifyGeolocation();
        creatineReminder();

        // Repeat the creatine reminder every hour
        setInterval(creatineReminder, 3600000);
    </script>
</body>
</html>
