<!-- Firebase SDK -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js";
  import { getFirestore, doc, getDoc, setDoc, onSnapshot, collection } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDTmLtAfc1qNNqTi-LAaTeVm5Eb-GywrwY",
    authDomain: "projeto-hor.firebaseapp.com",
    projectId: "projeto-hor",
    storageBucket: "projeto-hor.firebasestorage.app",
    messagingSenderId: "1021955246820",
    appId: "1:1021955246820:web:555b3a363c72c7d8b9baf1",
    measurementId: "G-NW2EH0HHZH"
  };

  const app = initializeApp(firebaseConfig);
  const db  = getFirestore(app);
  const USER_ID = "camila_evelyn";

  window._firebaseDB     = db;
  window._firebaseDocRef = (path) => doc(db, "usuarios", USER_ID, ...path.split("/"));
  window._firebaseSetDoc = setDoc;
  window._firebaseGetDoc = getDoc;
  window._firebaseOnSnapshot = onSnapshot;
  window._firebaseReady  = true;

  window.addEventListener("firebase-sync-request", async () => {
    try {
      const localData = JSON.parse(localStorage.getItem('treino_v3') || '{}');
      const ref = window._firebaseDocRef("dados/treino_v3");
      await window._firebaseSetDoc(ref, { payload: JSON.stringify(localData) }, { merge: true });
    } catch(e) { console.warn("Firebase sync error:", e); }
  });

  try {
    const ref = window._firebaseDocRef("dados/treino_v3");
    const snap = await window._firebaseGetDoc(ref);
    if (snap.exists()) {
      const remoteData = JSON.parse(snap.data().payload || '{}');
      localStorage.setItem('treino_v3', JSON.stringify(remoteData));
      console.log("✅ Dados carregados do Firestore");
    }
  } catch(e) { console.warn("Firestore load error:", e); }

  const ref = window._firebaseDocRef("dados/treino_v3");
  window._firebaseOnSnapshot(ref, (snap) => {
    if (snap.exists() && window._firebaseSkipSnapshot !== true) {
      const remoteData = JSON.parse(snap.data().payload || '{}');
      localStorage.setItem('treino_v3', JSON.stringify(remoteData));
      if (typeof renderMain === 'function') renderMain();
    }
  });

  window.dispatchEvent(new Event("firebase-ready"));
</script>

<style>
  :root {
    --bg:         #fce8f0;
    --surface:    #ffffff;
    --surface2:   #fff0f6;
    --border:     rgba(220,100,150,0.18);
    --border2:    rgba(220,100,150,0.38);
    --pink:       #d63f7e;
    --pink-mid:   #e8619a;
    --pink-light: #f5aac8;
    --pink-pale:  #fce8f0;
    --pink-glow:  rgba(214,63,126,0.18);
    --mauve:      #c084a0;
    --rose:       #f43f82;
    --text:       #3d1a2e;
    --text2:      #7a3d5a;
    --muted:      #b07090;
    --radius:     18px;
    --shadow:     0 4px 24px rgba(214,63,126,0.10);
    --shadow2:    0 8px 32px rgba(214,63,126,0.15);
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Jost', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  .creatine-modal {
    display: none;
    position: fixed;
    z-index: 9999;
    left: 0;
    top: 0;
    width: 100%;
    height: 100%;
    background-color: rgba(61, 26, 46, 0.8);
    backdrop-filter: blur(8px);
    animation: fadeIn 0.3s ease;
  }

  .creatine-modal-content {
    background: linear-gradient(135deg, #fce8f0, #fff0f6);
    margin: 50% auto;
    padding: 40px 32px;
    border-radius: 24px;
    width: 90%;
    max-width: 420px;
    text-align: center;
    box-shadow: 0 20px 60px rgba(214, 63, 126, 0.3);
    animation: slideUp 0.4s cubic-bezier(0.32, 1, 0.6, 1);
  }

  .creatine-modal-content h2 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 2rem;
    font-weight: 700;
    color: #d63f7e;
    margin: 20px 0 12px;
  }

  .creatine-modal-content p {
    font-size: 0.95rem;
    color: #7a3d5a;
    margin: 0 0 28px;
  }

  .creatine-modal-content button {
    background: linear-gradient(135deg, #d63f7e, #e8619a);
    color: #fff;
    border: none;
    border-radius: 14px;
    padding: 14px 32px;
    margin: 10px auto;
    width: 100%;
    cursor: pointer;
    transition: all 0.3s;
    font-family: 'Jost', sans-serif;
    font-weight: 600;
  }

  .creatine-modal-content button:hover {
    transform: translateY(-3px);
    box-shadow: 0 8px 20px rgba(214, 63, 126, 0.4);
  }

  .creatine-modal-content button.secondary {
    background: transparent;
    color: #d63f7e;
    border: 2px solid #d63f7e;
  }

  .creatine-icon {
    font-size: 3.5rem;
    margin-bottom: 20px;
  }

  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  @keyframes slideUp {
    from { transform: translateY(40px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }
</style>
</head>
<body>
  <h1>Welcome to the Academy</h1>

  <script>
    let lastCreatineNotificationTime = null;
    let hasShownCreatineToday = localStorage.getItem('creatine_shown_today') === new Date().toDateString();

    function notifyGeolocation() {
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(function(position) {
                const academyCoords = { lat: -3.756198272665352, lng: -38.56503948107475 };
                const userCoords = { lat: position.coords.latitude, lng: position.coords.longitude };
                const distance = Math.sqrt(Math.pow(userCoords.lat - academyCoords.lat, 2) + Math.pow(userCoords.lng - academyCoords.lng, 2));
                if (distance < 0.0018) {
                    alert('🏋️ Você chegou à academia!');
                }
            });
        } else {
            alert('Geolocation is not supported by this browser.');
        }
    }

    function showCreatineModal() {
        if (hasShownCreatineToday) return;

        const modal = document.createElement('div');
        modal.classList.add('creatine-modal');
        modal.style.display = 'block';
        modal.innerHTML = `
            <div class='creatine-modal-content'>
                <div class='creatine-icon'>💊</div>
                <h2>Hora da Creatina!</h2>
                <p>Não se esqueça de tomar sua creatina agora às 21h!</p>
                <button id='checkin-btn'>✓ Já Fiz o Check-in</button>
                <button id='reminder-btn' class='secondary'>⏰ Lembrar depois</button>
            </div>
        `;

        document.body.appendChild(modal);
        lastCreatineNotificationTime = new Date();

        document.getElementById('checkin-btn').addEventListener('click', async function() {
            try {
                const now = new Date();
                const creatineData = {
                    timestamp: now.toISOString(),
                    hora: String(now.getHours()).padStart(2, '0') + ':' + String(now.getMinutes()).padStart(2, '0'),
                    data: now.toLocaleDateString('pt-BR'),
                    confirmado: true
                };

                let creatineHistory = JSON.parse(localStorage.getItem('creatine_history') || '[]');
                creatineHistory.push(creatineData);
                localStorage.setItem('creatine_history', JSON.stringify(creatineHistory));
                localStorage.setItem('creatine_shown_today', now.toDateString());

                if (window._firebaseReady && window._firebaseDocRef && window._firebaseSetDoc) {
                    const ref = window._firebaseDocRef('dados/creatine_checkin');
                    await window._firebaseSetDoc(ref, {
                        ultima_data: now.toISOString(),
                        checkin: creatineData
                    }, { merge: true });
                    console.log('✅ Check-in salvo no Firebase!');
                } else {
                    console.log('⚠️ Firebase não disponível, salvo localmente');
                }

                alert('✅ Check-in de creatina registrado!');
                modal.remove();
            } catch (error) {
                console.error('Erro ao fazer check-in:', error);
                alert('✓ Check-in registrado localmente!');
                modal.remove();
            }
        });

        document.getElementById('reminder-btn').addEventListener('click', function() {
            lastCreatineNotificationTime = null;
            modal.remove();
        });

        window.addEventListener('click', function(event) {
            if (event.target === modal) {
                modal.remove();
            }
        });
    }

    function creatineReminder() {
        const now = new Date();
        if (now.getHours() === 21 && now.getMinutes() === 0) {
            showCreatineModal();
        }
    }

    notifyGeolocation();
    creatineReminder();

    setInterval(creatineReminder, 60000);
  </script>
</body>
</html>
