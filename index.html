<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#1a1a2e">
  <title>Meus Treinos 💪</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <div class="header-top">
      <div class="logo">MEU<span>TREINO</span></div>
      <div class="date-badge" id="dateBadge"></div>
    </div>
    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-num accent" id="totalHoje">0</div>
        <div class="stat-label">Hoje</div>
      </div>
      <div class="stat-card">
        <div class="stat-num accent2" id="totalSemana">0</div>
        <div class="stat-label">Na semana</div>
      </div>
      <div class="stat-card">
        <div class="stat-num green" id="totalMinutos">0</div>
        <div class="stat-label">Min hoje</div>
      </div>
    </div>
  </header>

  <main>
    <div class="section-title">Registrar treino</div>

    <div class="add-form">
      <div class="grupos-grid" id="gruposGrid">
        <button class="grupo-btn" data-grupo="Peito">💪 Peito</button>
        <button class="grupo-btn" data-grupo="Costas">🏋️ Costas</button>
        <button class="grupo-btn" data-grupo="Ombros">🔝 Ombros</button>
        <button class="grupo-btn" data-grupo="Bíceps">💪 Bíceps</button>
        <button class="grupo-btn" data-grupo="Tríceps">💪 Tríceps</button>
        <button class="grupo-btn" data-grupo="Abdômen">🔥 Abdômen</button>
        <button class="grupo-btn" data-grupo="Quadríceps">🦵 Quadríceps</button>
        <button class="grupo-btn" data-grupo="Posterior">🦵 Posterior</button>
        <button class="grupo-btn" data-grupo="Glúteos">🍑 Glúteos</button>
        <button class="grupo-btn" data-grupo="Panturrilha">🦶 Panturrilha</button>
        <button class="grupo-btn" data-grupo="Cardio">❤️ Cardio</button>
      </div>
      <div class="form-row" style="margin-top:12px">
        <input type="number" id="duracaoInput" placeholder="Duração (min)" min="1" max="300" />
        <input type="number" id="kcalInput" placeholder="Kcal (opcional)" min="0" max="5000" />
      </div>
      <div class="form-row">
        <button class="btn btn-primary" onclick="adicionarTreino()">＋ Adicionar Treino</button>
      </div>
    </div>

    <div class="section-title">Esta semana</div>
    <div class="week-chart" id="weekChart">
      <div class="bars" id="barsContainer"></div>
    </div>

    <div class="section-title">Treinos de hoje</div>
    <div class="workout-list" id="workoutList">
      <div class="empty-state">
        <span class="emoji">💪</span>
        <p>Nenhum treino registrado hoje.<br>Adicione seu primeiro treino acima!</p>
      </div>
    </div>
  </main>

  <script src="app.js"></script>
</body>
</html>
