<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#080818">
  <title>CasalFit 💪❤️</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- HEADER -->
  <header>
    <div class="header-bg-blur"></div>
    <div class="header-inner">
      <div class="logo-wrap">
        <div class="logo">CASAL<span>FIT</span></div>
        <div class="logo-heart">❤️‍🔥</div>
      </div>
      <div class="date-badge" id="dateBadge"></div>
    </div>

    <!-- PLACAR DUELO -->
    <div class="duelo-card">
      <div class="duelo-player neto-side">
        <div class="player-avatar neto-av">N</div>
        <div class="player-info">
          <div class="player-name">Neto</div>
          <div class="player-pts neto-pts" id="ptNeto">0 pts</div>
        </div>
      </div>

      <div class="duelo-center">
        <div class="vs-ring">
          <span class="vs-text">VS</span>
        </div>
        <div class="leader-badge" id="leaderBadge">🏆</div>
      </div>

      <div class="duelo-player camila-side">
        <div class="player-info right-info">
          <div class="player-name">Camila</div>
          <div class="player-pts camila-pts" id="ptCamila">0 pts</div>
        </div>
        <div class="player-avatar camila-av">C</div>
      </div>
    </div>

    <!-- BARRA DE PROGRESSO DUELO -->
    <div class="duel-bar-wrap">
      <div class="duel-bar">
        <div class="duel-fill neto-fill" id="netoFill"></div>
        <div class="duel-fill camila-fill" id="camilaFill"></div>
      </div>
    </div>

  </header>

  <main>

    <!-- TABS JOGADOR -->
    <div class="tabs-row">
      <button class="tab active" id="tabNeto" onclick="setPlayer('neto')">
        <span class="tab-dot neto-dot"></span> Neto
      </button>
      <button class="tab" id="tabCamila" onclick="setPlayer('camila')">
        <span class="tab-dot camila-dot"></span> Camila
      </button>
    </div>

    <!-- STATS -->
    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-num" id="totalHoje">0</div>
        <div class="stat-label">Hoje</div>
      </div>
      <div class="stat-card">
        <div class="stat-num s2" id="totalSemana">0</div>
        <div class="stat-label">Semana</div>
      </div>
      <div class="stat-card">
        <div class="stat-num s3" id="totalMinutos">0</div>
        <div class="stat-label">Min hoje</div>
      </div>
      <div class="stat-card">
        <div class="stat-num s4" id="totalPts">0</div>
        <div class="stat-label">Pts hoje</div>
      </div>
    </div>

    <!-- FORM -->
    <div class="section-title">
      <span>Registrar treino</span>
    </div>

    <div class="add-form">
      <div class="grupos-grid" id="gruposGrid">
        <button class="grupo-btn" data-grupo="Peito">💪 Peito</button>
        <button class="grupo-btn" data-grupo="Costas">🏋️ Costas</button>
        <button class="grupo-btn" data-grupo="Ombros">🔝 Ombros</button>
        <button class="grupo-btn" data-grupo="Bíceps">💪 Bíceps</button>
        <button class="grupo-btn" data-grupo="Tríceps">💪 Tríceps</button>
        <button class="grupo-btn" data-grupo="Abdômen">🔥 Abdômen</button>
        <button class="grupo-btn" data-grupo="Quadríceps">🦵 Quadríceps</button>
        <button class="grupo-btn" data-grupo="Posterior">🦵 Posterior</button>
        <button class="grupo-btn" data-grupo="Glúteos">🍑 Glúteos</button>
        <button class="grupo-btn" data-grupo="Panturrilha">🦶 Panturrilha</button>
        <button class="grupo-btn" data-grupo="Cardio">❤️ Cardio</button>
        <button class="grupo-btn" data-grupo="Full Body">⚡ Full Body</button>
      </div>
      <div class="form-row" style="margin-top:14px">
        <input type="number" id="duracaoInput" placeholder="Duração (min)" min="1" max="300" />
        <input type="number" id="kcalInput" placeholder="Kcal (opcional)" min="0" max="5000" />
      </div>
      <div class="pts-preview" id="ptsPreview">
        <span>⚡ Pontos estimados: <strong id="ptsEstimado">—</strong></span>
      </div>
      <div class="form-row">
        <button class="btn btn-primary" id="btnAdicionar" onclick="adicionarTreino()">＋ Adicionar Treino</button>
      </div>
    </div>

    <!-- CHART -->
    <div class="section-title"><span>Esta semana</span></div>
    <div class="week-chart">
      <div class="bars" id="barsContainer"></div>
    </div>

    <!-- LISTA -->
    <div class="section-title"><span>Treinos de hoje</span></div>
    <div class="workout-list" id="workoutList">
      <div class="empty-state">
        <span class="emoji">💪</span>
        <p>Nenhum treino registrado hoje.<br>Bora começar!</p>
      </div>
    </div>

    <!-- RANKING GERAL -->
    <div class="section-title"><span>Ranking geral</span></div>
    <div class="ranking-card" id="rankingCard"></div>

  </main>

  <script src="app.js"></script>
</body>
</html>
