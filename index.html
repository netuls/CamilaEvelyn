<body>

  <!-- SPLASH SCREEN -->
  <div id="splash">
    <div class="splash-bg"></div>
    <div class="splash-inner">
      <div class="splash-photo-wrap">
        <div class="splash-photo-ring"></div>
        <img id="splashPhoto" class="splash-photo" src="" alt="Neto e Camila" />
      </div>
      <div class="splash-logo">CASAL<span>FIT</span></div>
      <div class="splash-tagline">Juntos, mais fortes</div>
      <div class="splash-loader">
        <div class="splash-bar"><div class="splash-progress" id="splashProgress"></div></div>
      </div>
    </div>
  </div>

  <!-- APP -->
  <div id="app" class="hidden">

    <!-- HEADER -->
    <header id="mainHeader">
      <div class="header-glass"></div>
      <div class="header-content">
        <div class="header-top">
          <div class="logo-mark">
            <span class="logo-text">CASAL<span class="logo-accent">FIT</span></span>
          </div>
          <div class="header-right">
            <div class="date-chip" id="dateBadge"></div>
            <button class="geo-btn" id="geoBtn" onclick="toggleGeo()" title="Alerta de academia">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3"/><path d="M4.93 4.93l2.12 2.12M16.95 16.95l2.12 2.12M4.93 19.07l2.12-2.12M16.95 7.05l2.12-2.12"/></svg>
            </button>
          </div>
        </div>

        <!-- DUELO -->
        <div class="duel-block">
          <div class="duel-player" id="duelNeto">
            <div class="duel-avatar neto-av">N</div>
            <div class="duel-player-info">
              <div class="duel-name">Neto</div>
              <div class="duel-pts neto-color" id="ptNeto">0</div>
              <div class="duel-pts-label">pontos</div>
            </div>
          </div>

          <div class="duel-mid">
            <div class="duel-vs-wrap">
              <div class="duel-vs">VS</div>
            </div>
            <div class="duel-status" id="duelStatus">Empate</div>
          </div>

          <div class="duel-player right" id="duelCamila">
            <div class="duel-player-info right-align">
              <div class="duel-name">Camila</div>
              <div class="duel-pts camila-color" id="ptCamila">0</div>
              <div class="duel-pts-label">pontos</div>
            </div>
            <div class="duel-avatar camila-av">C</div>
          </div>
        </div>

        <!-- PROGRESS BAR -->
        <div class="duel-progress-wrap">
          <div class="duel-progress-track">
            <div class="duel-progress-neto" id="progNeto" style="width:50%"></div>
            <div class="duel-progress-camila" id="progCamila" style="width:50%"></div>
          </div>
          <div class="duel-progress-labels">
            <span id="progLabelNeto">50%</span>
            <span id="progLabelCamila">50%</span>
          </div>
        </div>

      </div>
    </header>

    <!-- GEO ALERT BANNER -->
    <div class="geo-banner hidden" id="geoBanner">
      <div class="geo-banner-dot"></div>
      <span id="geoBannerText">Monitorando localização...</span>
      <button class="geo-banner-close" onclick="disableGeo()">x</button>
    </div>

    <!-- MAIN -->
    <main>

      <!-- PLAYER TABS -->
      <div class="player-tabs">
        <button class="ptab active" id="tabNeto" onclick="setPlayer('neto')">
          <div class="ptab-indicator neto-ind"></div>
          <div class="ptab-content">
            <div class="ptab-name">Neto</div>
            <div class="ptab-sub" id="tabNetoSub">0 treinos</div>
          </div>
        </button>
        <button class="ptab" id="tabCamila" onclick="setPlayer('camila')">
          <div class="ptab-indicator camila-ind"></div>
          <div class="ptab-content">
            <div class="ptab-name">Camila</div>
            <div class="ptab-sub" id="tabCamilaSub">0 treinos</div>
          </div>
        </button>
      </div>

      <!-- STATS STRIP -->
      <div class="stats-strip">
        <div class="stat-pill">
          <div class="stat-val" id="totalHoje">0</div>
          <div class="stat-key">Hoje</div>
        </div>
        <div class="stat-divider"></div>
        <div class="stat-pill">
          <div class="stat-val v2" id="totalSemana">0</div>
          <div class="stat-key">Semana</div>
        </div>
        <div class="stat-divider"></div>
        <div class="stat-pill">
          <div class="stat-val v4" id="totalPtsHoje">0</div>
          <div class="stat-key">Pts hoje</div>
        </div>
      </div>

      <!-- FORM -->
      <section class="section">
        <div class="section-label">Registrar treino</div>
        <div class="form-card">
          <div class="grupos-grid" id="gruposGrid">
            <button class="grupo-btn" data-grupo="Peito">Peito</button>
            <button class="grupo-btn" data-grupo="Costas">Costas</button>
            <button class="grupo-btn" data-grupo="Ombros">Ombros</button>
            <button class="grupo-btn" data-grupo="Biceps">Biceps</button>
            <button class="grupo-btn" data-grupo="Triceps">Triceps</button>
            <button class="grupo-btn" data-grupo="Abdomen">Abdomen</button>
            <button class="grupo-btn" data-grupo="Quadriceps">Quadriceps</button>
            <button class="grupo-btn" data-grupo="Posterior">Posterior</button>
            <button class="grupo-btn" data-grupo="Gluteos">Gluteos</button>
            <button class="grupo-btn" data-grupo="Panturrilha">Panturrilha</button>
            <button class="grupo-btn" data-grupo="Cardio">Cardio</button>
            <button class="grupo-btn" data-grupo="Full Body">Full Body</button>
          </div>

          <div class="pts-estimate" id="ptsEstimate">
            <div class="pts-est-label">Pontos neste treino</div>
            <div class="pts-est-val" id="ptsEstVal">10 pts</div>
          </div>
          <button class="add-btn" id="addBtn" onclick="adicionarTreino()">
            <span>Adicionar Treino</span>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          </button>
        </div>
      </section>

      <!-- CHART -->
      <section class="section">
        <div class="section-label">Esta semana</div>
        <div class="chart-card">
          <div class="chart-bars" id="barsContainer"></div>
          <div class="chart-pts-row" id="chartPtsRow"></div>
        </div>
      </section>

      <!-- TODAY LIST -->
      <section class="section">
        <div class="section-label">Treinos de hoje</div>
        <div id="workoutList"></div>
      </section>

      <!-- RANKING -->
      <section class="section">
        <div class="section-label">Placar geral</div>
        <div class="ranking-wrap" id="rankingWrap"></div>
      </section>

    </main>

  </div>

  <!-- TOAST -->
  <div class="toast" id="toast"></div>

  <script src="app.js"></script>
</body>
</html>
